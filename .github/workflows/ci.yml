name: CI — HSE Cockpit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. Type check + Build ──────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true   # TS5101 deprecation warning is non-fatal

      - name: Build
        env:
          AUTH_SECRET: ci-test-secret-32-chars-minimum!!
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1

  # ── 2. E2E Tests ───────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Run E2E tests
        env:
          AUTH_SECRET: ci-test-secret-32-chars-minimum!!
          NEXTAUTH_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
        run: npx playwright test --reporter=list

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 3. Security audit ─────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM audit (high severity)
        run: npm audit --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "AUTH_SECRET=" --include="*.ts" --include="*.tsx" --include="*.js" app/ lib/ components/ 2>/dev/null | grep -v "process.env" | grep -v ".env.local.example" | grep -q .; then
            echo "ERREUR: Secrets hardcodes detectes"
            exit 1
          fi
          echo "OK: Aucun secret hardcode detecte"

  # ── 4. Deploy to Vercel (main branch only) ────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel --prod --token=$VERCEL_TOKEN
